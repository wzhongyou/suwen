# Suwen — AI-powered search engine
# Phase 3: production-ready deployment

services:
  suwen:
    build: .
    container_name: suwen
    ports:
      - "8080:8080"
    environment:
      - DEEPSEEK_KEY=${DEEPSEEK_KEY:-}
      - GLM_KEY=${GLM_KEY:-}
      - OPENAI_KEY=${OPENAI_KEY:-}
    volumes:
      - ./conf:/app/conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

